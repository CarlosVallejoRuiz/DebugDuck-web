<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DebugDuck Arcade</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕹️</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#00ff00;--gd:rgba(0,255,0,0.55);--gb:rgba(0,255,0,0.08);
  --r:#ff0000;--y:#ffff00;--w:#ffffff;--k:#000;--gr:#333;
  --font:'Courier New',Courier,monospace;
}
body{background:#000;color:#00ff00;font-family:var(--font);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
/* HEADER */
.arcade-header{width:100%;max-width:920px;padding:14px 20px;border-bottom:1px solid #00ff00;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.arcade-logo{font-size:1rem;font-weight:700;letter-spacing:.1em;}
.arcade-logo span{color:#ffff00;}
.back-btn,.sel-btn{background:none;border:1px solid #00ff00;color:#00ff00;font-family:inherit;font-size:.82rem;padding:5px 13px;cursor:pointer;letter-spacing:.05em;text-decoration:none;display:inline-block;transition:all .15s;}
.back-btn:hover,.sel-btn:hover{background:#00ff00;color:#000;}
/* MAIN */
.arcade-main{width:100%;max-width:920px;padding:20px;flex:1;}
/* SELECTOR */
.selector-title{text-align:center;font-size:1.2rem;letter-spacing:.15em;margin-bottom:6px;color:#fff;}
.selector-sub{text-align:center;font-size:.78rem;color:var(--gd);margin-bottom:28px;letter-spacing:.08em;}
.games-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:11px;}
.game-btn{background:#000;border:1px solid #00ff00;color:#00ff00;font-family:inherit;font-size:.85rem;padding:16px 14px;cursor:pointer;text-align:left;transition:all .15s;display:flex;flex-direction:column;gap:5px;position:relative;}
.game-btn:hover{background:var(--gb);border-color:#fff;box-shadow:0 0 12px rgba(0,255,0,.35);}
.game-btn-emoji{font-size:1.7rem;}
.game-btn-name{font-weight:700;letter-spacing:.05em;font-size:.88rem;color:#fff;}
.game-btn-desc{font-size:.72rem;color:var(--gd);line-height:1.4;}
.game-btn-best{position:absolute;top:7px;right:7px;font-size:.62rem;color:#ffff00;}
/* GAME CONTAINERS */
.game-container{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;}
.game-container.hidden{display:none;}
.game-title-bar{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid rgba(0,255,0,.3);margin-bottom:6px;}
.game-title{font-size:.95rem;letter-spacing:.1em;color:#fff;}
.game-meta{font-size:.78rem;color:var(--gd);}
.game-meta span{color:#fff;}
/* SHARED */
.terminal-box{border:1px solid #00ff00;padding:18px;width:100%;max-width:700px;background:#000;}
.terminal-box.wide{max-width:860px;}
.btn-terminal{background:none;border:1px solid #00ff00;color:#00ff00;font-family:inherit;font-size:.85rem;padding:7px 18px;cursor:pointer;letter-spacing:.05em;transition:all .15s;}
.btn-terminal:hover{background:#00ff00;color:#000;}
.btn-terminal.danger{border-color:#ff0000;color:#ff0000;}
.btn-terminal.danger:hover{background:#ff0000;color:#000;}
.btn-terminal.yellow{border-color:#ffff00;color:#ffff00;}
.btn-terminal.yellow:hover{background:#ffff00;color:#000;}
.btn-terminal:disabled{opacity:.35;cursor:default;}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:10px;}
.progress-track{width:100%;height:7px;background:#111;border:1px solid #00ff00;margin:6px 0;}
.progress-fill{height:100%;background:#00ff00;transition:width .1s linear,background .3s;}
/* GAME OVER */
#gameover-overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
#gameover-overlay.hidden{display:none;}
.gameover-box{border:2px solid #00ff00;background:#000;padding:30px;max-width:460px;width:100%;text-align:center;box-shadow:0 0 28px rgba(0,255,0,.28);}
.gameover-ascii{font-size:.72rem;color:#00ff00;margin-bottom:14px;line-height:1.3;white-space:pre;}
.gameover-title{font-size:1.3rem;color:#fff;letter-spacing:.15em;margin-bottom:6px;}
.gameover-score{font-size:2rem;color:#ffff00;margin:10px 0;letter-spacing:.1em;}
.gameover-best{font-size:.72rem;color:#ffff00;margin-bottom:12px;}
.gameover-msg{font-size:.85rem;color:var(--gd);margin-bottom:22px;line-height:1.6;font-style:italic;}

/* ── FLAPPY ── */
#game-flappy canvas{border:1px solid #00ff00;display:block;max-width:100%;}

/* ── QUIZ ── */
.quiz-question{font-size:.95rem;color:#fff;line-height:1.65;margin-bottom:18px;padding:14px;border-left:3px solid #00ff00;}
.quiz-options{display:flex;flex-direction:column;gap:9px;}
.quiz-opt{background:none;border:1px solid rgba(0,255,0,.5);color:#00ff00;font-family:inherit;font-size:.85rem;padding:9px 14px;cursor:pointer;text-align:left;transition:all .15s;}
.quiz-opt:hover:not(:disabled){background:var(--gb);border-color:#00ff00;}
.quiz-opt.correct{background:rgba(0,255,0,.2);border-color:#00ff00;color:#fff;}
.quiz-opt.wrong{background:rgba(255,0,0,.15);border-color:#ff0000;color:#ff0000;}
.quiz-opt:disabled{cursor:default;}

/* ── PIXEL ── */
.pixel-grid{display:grid;gap:1px;background:#111;border:1px solid #00ff00;cursor:crosshair;user-select:none;}
.pixel-cell{background:#000;}
.pixel-cell.lit{background:#00ff00;}
.pixel-cell:hover{background:rgba(0,255,0,.25);}

/* ── TYPING ── */
.typing-word{font-size:2rem;color:#fff;text-align:center;letter-spacing:.2em;margin:18px 0;}
.typing-input{background:none;border:none;border-bottom:2px solid #00ff00;color:#00ff00;font-family:inherit;font-size:1.3rem;text-align:center;width:100%;max-width:380px;padding:7px;outline:none;letter-spacing:.15em;}

/* ── MATH ── */
.math-problem{font-size:2.4rem;text-align:center;color:#fff;letter-spacing:.15em;margin:18px 0;}
.math-input{background:none;border:1px solid #00ff00;color:#00ff00;font-family:inherit;font-size:1.4rem;text-align:center;width:110px;padding:7px;outline:none;}

/* ── TTT ── */
.ttt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;width:228px;margin:0 auto;}
.ttt-cell{width:74px;height:74px;border:1px solid #00ff00;background:none;color:#00ff00;font-family:inherit;font-size:1.8rem;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;}
.ttt-cell:hover:not(:disabled){background:var(--gb);}
.ttt-cell:disabled{cursor:default;}
.ttt-cell.o-mark{color:#ff0000;}

/* ── MEMORY ── */
.memory-grid{display:grid;gap:7px;margin:0 auto;max-width:580px;}
.mem-card{aspect-ratio:1;border:1px solid #00ff00;background:#000;color:#00ff00;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;}
.mem-card:hover:not(.revealed):not(.matched){background:var(--gb);}
.mem-card.revealed{background:rgba(0,255,0,.1);border-color:#fff;}
.mem-card.matched{background:rgba(0,255,0,.18);opacity:.65;cursor:default;}
.mem-card.face-down{font-size:.7rem;color:rgba(0,255,0,.45);}

/* ── BEAT ── */
.beat-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:480px;margin:18px auto;}
.beat-btn{height:96px;border:2px solid #00ff00;background:#000;color:#00ff00;font-family:inherit;font-size:1.6rem;font-weight:700;cursor:pointer;transition:all .1s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.beat-btn .bk{font-size:.7rem;color:rgba(0,255,0,.55);}
.beat-btn:hover{background:var(--gb);}
.beat-btn.active{background:#fff;color:#000;border-color:#fff;box-shadow:0 0 18px rgba(0,255,0,.55);}
.beat-btn:disabled{cursor:default;opacity:.38;}

/* ── SUDOKU ── */
.sudoku-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;width:236px;margin:0 auto;}
.sudoku-cell{width:56px;height:56px;border:1px solid rgba(0,255,0,.45);background:#000;color:#00ff00;font-family:inherit;font-size:1.3rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;user-select:none;}
.sudoku-cell.prefilled{font-weight:700;cursor:default;}
.sudoku-cell.selected{background:rgba(0,255,0,.14);border-color:#fff;}
.sudoku-cell.wrong{color:#ff0000;animation:blink .45s 3;}
.sudoku-cell.solved{color:#ffff00;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
.numpad{display:flex;gap:7px;justify-content:center;margin-top:10px;}
.numpad-btn{width:42px;height:42px;border:1px solid #00ff00;background:none;color:#00ff00;font-family:inherit;font-size:1.05rem;cursor:pointer;transition:all .15s;}
.numpad-btn:hover{background:rgba(0,255,0,.15);}

/* ── BUG HUNT ── */
.code-block{background:#050505;border:1px solid rgba(0,255,0,.35);padding:10px;margin:10px 0;font-size:.8rem;line-height:1.9;}
.code-line{display:flex;align-items:center;gap:10px;padding:3px 7px;cursor:pointer;transition:background .1s;}
.code-line:hover{background:rgba(0,255,0,.09);}
.code-line.correct-line{background:rgba(0,255,0,.18);}
.code-line.wrong-line{background:rgba(255,0,0,.14);}
.line-num{color:rgba(0,255,0,.4);min-width:20px;text-align:right;}
.line-sep{color:rgba(0,255,0,.3);}
.line-code{color:#00ff00;white-space:pre;}

/* ── WORDLE ── */
.wordle-grid{display:flex;flex-direction:column;gap:5px;margin:10px auto;align-items:center;}
.wordle-row{display:flex;gap:5px;}
.wordle-cell{width:46px;height:46px;border:1px solid rgba(0,255,0,.4);background:#000;display:flex;align-items:center;justify-content:center;font-size:1.25rem;font-weight:700;color:#00ff00;transition:all .25s;}
.wordle-cell.correct{background:#00ff00;color:#000;border-color:#00ff00;}
.wordle-cell.present{background:#ffff00;color:#000;border-color:#ffff00;}
.wordle-cell.absent{background:#222;color:#555;border-color:#222;}
.wordle-cell.filled{border-color:rgba(0,255,0,.8);}
.wordle-keyboard{display:flex;flex-direction:column;gap:5px;align-items:center;margin-top:10px;}
.wordle-kb-row{display:flex;gap:4px;}
.kb-key{background:#1a1a1a;border:1px solid rgba(0,255,0,.35);color:#00ff00;font-family:inherit;font-size:.68rem;padding:7px 9px;cursor:pointer;min-width:30px;text-align:center;transition:all .2s;}
.kb-key:hover{background:rgba(0,255,0,.14);}
.kb-key.correct{background:#00ff00;color:#000;border-color:#00ff00;}
.kb-key.present{background:#ffff00;color:#000;border-color:#ffff00;}
.kb-key.absent{background:#111;color:#333;border-color:#111;}
.kb-key.wide{padding:7px 13px;}

@media(max-width:600px){
  .games-list{grid-template-columns:repeat(2,1fr);}
  .beat-buttons{grid-template-columns:repeat(2,1fr);}
  .wordle-cell{width:38px;height:38px;font-size:1rem;}
  .kb-key{font-size:.6rem;padding:6px 6px;min-width:26px;}
  .ttt-cell{width:62px;height:62px;}
  .sudoku-cell{width:48px;height:48px;}
}
</style>
</head>
<body>

<header class="arcade-header">
  <div class="arcade-logo">🦆 DEBUG<span>DUCK</span>.ARCADE</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="sel-btn" id="header-sel" onclick="showSelector()" style="display:none;">[← JUEGOS]</button>
    <a href="../index.html" class="back-btn">[← WEB]</a>
  </div>
</header>

<main class="arcade-main">
  <div id="selector">
    <p class="selector-title">┌─── SELECCIONA UN JUEGO ───┐</p>
    <p class="selector-sub">▶ ELIGE TU VENENO. EL PATO TE JUZGA DE TODAS FORMAS.</p>
    <div class="games-list" id="games-list"></div>
  </div>

  <div id="game-flappy"  class="game-container hidden"></div>
  <div id="game-quiz"    class="game-container hidden"></div>
  <div id="game-pixel"   class="game-container hidden"></div>
  <div id="game-typing"  class="game-container hidden"></div>
  <div id="game-math"    class="game-container hidden"></div>
  <div id="game-ttt"     class="game-container hidden"></div>
  <div id="game-memory"  class="game-container hidden"></div>
  <div id="game-beat"    class="game-container hidden"></div>
  <div id="game-sudoku"  class="game-container hidden"></div>
  <div id="game-bughunt" class="game-container hidden"></div>
  <div id="game-wordle"  class="game-container hidden"></div>
</main>

<div id="gameover-overlay" class="hidden">
  <div class="gameover-box">
    <pre class="gameover-ascii">  🦆
 /|||\
  | |</pre>
    <div class="gameover-title" id="go-title">GAME OVER</div>
    <div class="gameover-score" id="go-score"></div>
    <div class="gameover-best"  id="go-best"></div>
    <div class="gameover-msg"   id="go-msg"></div>
    <div class="btn-row">
      <button class="btn-terminal"        onclick="replayGame()">[▶ JUGAR DE NUEVO]</button>
      <button class="btn-terminal yellow"  onclick="randomGame()">[🔀 OTRO JUEGO]</button>
      <button class="btn-terminal danger"  onclick="showSelector()">[✕ CERRAR]</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ============================================================
   SHARED INFRASTRUCTURE
   ============================================================ */
const GAMES=[
  {id:'flappy', emoji:'🎯',name:'Flappy Duck',   desc:'Esquiva obstáculos. Como los deadlines.',          key:'dd_best_flappy'},
  {id:'quiz',   emoji:'🧠',name:'Debug Quiz',    desc:'¿Cuánto sabes realmente de programación?',         key:'dd_best_quiz'},
  {id:'pixel',  emoji:'🎨',name:'Pato Pixel',    desc:'Dibuja. La IA local te puntúa sin piedad.',        key:'dd_best_pixel'},
  {id:'typing', emoji:'⚡',name:'Duck Typing',   desc:'Velocidad de escritura con términos técnicos.',    key:'dd_best_typing'},
  {id:'math',   emoji:'🔢',name:'Duck Math',     desc:'Operaciones mentales contra el reloj.',             key:'dd_best_math'},
  {id:'ttt',    emoji:'❌',name:'3 en Raya',      desc:'Juega contra el pato. Nunca ganarás.',             key:'dd_best_ttt'},
  {id:'memory', emoji:'🃏',name:'Memory Duck',   desc:'Parejas de emojis técnicos. ¿Tienes memoria?',     key:'dd_best_memory'},
  {id:'beat',   emoji:'🎵',name:'Duck Beat',     desc:'Simon Says con sonidos. Escucha y repite.',         key:'dd_best_beat'},
  {id:'sudoku', emoji:'🔲',name:'Sudoku Duck',   desc:'4×4. Números 1-4. Lógica pura.',                   key:'dd_best_sudoku'},
  {id:'bughunt',emoji:'🐛',name:'Bug Hunt',      desc:'Encuentra el bug antes de que llegue a prod.',      key:'dd_best_bughunt'},
  {id:'wordle', emoji:'💬',name:'Duck Wordle',   desc:'Adivina la palabra tech en 6 intentos.',           key:'dd_best_wordle'},
];

let currentGame=null, cleanupFn=null;
let audioCtx=null;

function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq=440,dur=150,type='square',vol=0.13){
  try{
    const ctx=getAudio(),osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime);
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);
    osc.start();osc.stop(ctx.currentTime+dur/1000);
  }catch(e){}
}
const beepGood =()=>beep(523,120,'square',.12);
const beepBad  =()=>beep(150,200,'sawtooth',.1);
const beepClick=()=>beep(880,55,'square',.07);

function buildSelector(){
  const list=document.getElementById('games-list');
  list.innerHTML=GAMES.map(g=>{
    const best=localStorage.getItem(g.key);
    return`<button class="game-btn" onclick="launchGame('${g.id}')">
      ${best?`<span class="game-btn-best">BEST:${best}</span>`:''}
      <span class="game-btn-emoji">${g.emoji}</span>
      <span class="game-btn-name">${g.name}</span>
      <span class="game-btn-desc">${g.desc}</span>
    </button>`;
  }).join('');
}

function launchGame(id){
  beepClick();
  if(cleanupFn){cleanupFn();cleanupFn=null;}
  document.getElementById('selector').style.display='none';
  document.getElementById('header-sel').style.display='';
  document.querySelectorAll('.game-container').forEach(el=>el.classList.add('hidden'));
  const c=document.getElementById('game-'+id);
  if(!c)return;
  c.classList.remove('hidden');
  currentGame=id;
  const fn=GAME_INITS[id];
  if(fn)fn(c);
}

function showSelector(){
  if(cleanupFn){cleanupFn();cleanupFn=null;}
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('selector').style.display='';
  document.getElementById('header-sel').style.display='none';
  document.querySelectorAll('.game-container').forEach(el=>el.classList.add('hidden'));
  buildSelector();
  currentGame=null;
}

function randomGame(){
  const others=GAMES.filter(g=>g.id!==currentGame);
  launchGame(others[Math.floor(Math.random()*others.length)].id);
}

function replayGame(){
  const id=currentGame;
  document.getElementById('gameover-overlay').classList.add('hidden');
  launchGame(id);
}

function showGameOver(score,msg,win=false){
  if(cleanupFn){cleanupFn();cleanupFn=null;}
  const gDef=GAMES.find(g=>g.id===currentGame);
  let bestTxt='';
  if(gDef){
    const prev=parseInt(localStorage.getItem(gDef.key)||'0');
    if(score>prev){localStorage.setItem(gDef.key,score);bestTxt='🏆 NUEVO RÉCORD';}
    else bestTxt=`MEJOR: ${prev}`;
  }
  document.getElementById('go-title').textContent=win?'VICTORIA':'GAME OVER';
  document.getElementById('go-score').textContent='SCORE: '+score;
  document.getElementById('go-best').textContent=bestTxt;
  document.getElementById('go-msg').textContent=msg;
  document.getElementById('gameover-overlay').classList.remove('hidden');
  win?beep(660,350,'square',.12):beepBad();
}

/* ============================================================
   GAME 1 — FLAPPY DUCK
   ============================================================ */
function initFlappy(C){
  const best=localStorage.getItem('dd_best_flappy')||'—';
  C.innerHTML=`
    <div class="game-title-bar" style="max-width:568px;">
      <span class="game-title">🎯 FLAPPY DUCK</span>
      <div class="game-meta">MEJOR:<span>${best}</span></div>
    </div>
    <canvas id="fl-c" width="560" height="370" style="max-width:100%;border:1px solid #00ff00;"></canvas>
    <p style="font-size:.75rem;color:var(--gd);margin-top:4px;">ESPACIO / CLICK / TAP para volar</p>`;

  const cv=document.getElementById('fl-c'),ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  let bird,pipes,score,frames,running,raf;

  function reset(){
    bird={x:80,y:H/2,vy:0,g:.45,jv:-8,r:14};
    pipes=[];score=0;frames=0;running=false;
  }

  function jump(){
    if(!running)running=true;
    bird.vy=bird.jv;
    beep(440,70,'square',.08);
  }

  function spawnPipe(){
    const gap=145,top=55+Math.random()*(H-gap-110);
    pipes.push({x:W+10,top,bot:top+gap,w:50,scored:false});
  }

  function loop(){
    frames++;
    if(running){
      bird.vy+=bird.g;bird.y+=bird.vy;
      if(frames%92===0)spawnPipe();
      for(const p of pipes){
        p.x-=3;
        if(!p.scored&&p.x+p.w<bird.x){p.scored=true;score++;beep(660,70);}
      }
      pipes=pipes.filter(p=>p.x>-p.w-5);
      const bx=bird.x,by=bird.y,br=bird.r-3;
      const dead=by+br>H-28||by-br<0||pipes.some(p=>bx+br>p.x&&bx-br<p.x+p.w&&(by-br<p.top||by+br>p.bot));
      if(dead){
        beepBad();
        const m=['Ni la física te quiere.','Como tus deadlines — esquivaste mal.','El pato muere de vergüenza.'];
        showGameOver(score,m[score%m.length]);
        return;
      }
    }
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#00ff00';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,H-27);ctx.lineTo(W,H-27);ctx.stroke();
    ctx.fillStyle='#004400';ctx.strokeStyle='#00ff00';
    for(const p of pipes){
      ctx.fillRect(p.x,0,p.w,p.top);ctx.strokeRect(p.x,0,p.w,p.top);
      ctx.fillRect(p.x,p.bot,p.w,H-p.bot-27);ctx.strokeRect(p.x,p.bot,p.w,H-p.bot-27);
    }
    ctx.save();ctx.translate(bird.x,bird.y);
    ctx.rotate(Math.min(Math.max(bird.vy*.05,-.4),.6));
    ctx.font=`${bird.r*2}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🦆',0,0);
    ctx.restore();
    ctx.fillStyle='#00ff00';ctx.font='14px "Courier New"';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('SCORE: '+score,8,8);
    if(!running){
      ctx.fillStyle='#fff';ctx.font='17px "Courier New"';ctx.textAlign='center';
      ctx.fillText('[ESPACIO / CLICK]',W/2,H/2-14);
      ctx.fillStyle='var(--gd)';ctx.font='12px "Courier New"';
      ctx.fillText('para empezar a volar',W/2,H/2+8);
    }
    raf=requestAnimationFrame(loop);

/* ============================================================
   GAME 6 — TIC-TAC-TOE
   ============================================================ */
function initTTT(C){
  let board,over;
  const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const wins=(b,p)=>lines.some(l=>l.every(i=>b[i]===p));

  function minimax(b,isMax){
    if(wins(b,'O'))return 10;if(wins(b,'X'))return -10;
    const empty=b.reduce((a,v,i)=>v===null?[...a,i]:a,[]);
    if(!empty.length)return 0;
    let best=isMax?-Infinity:Infinity;
    for(const i of empty){
      b[i]=isMax?'O':'X';const v=minimax(b,!isMax);b[i]=null;
      best=isMax?Math.max(best,v):Math.min(best,v);
    }
    return best;
  }

  function aiMove(){
    const empty=board.reduce((a,v,i)=>v===null?[...a,i]:a,[]);
    if(!empty.length)return;
    let best=-Infinity,bi=empty[0];
    for(const i of empty){board[i]='O';const v=minimax(board,false);board[i]=null;if(v>best){best=v;bi=i;}}
    board[bi]='O';
  }

  function render(){
    const st=document.getElementById('ttt-st'),cells=C.querySelectorAll('.ttt-cell');
    board.forEach((v,i)=>{
      cells[i].textContent=v==='X'?'✕':v==='O'?'○':'';
      cells[i].className='ttt-cell'+(v==='O'?' o-mark':'');
      cells[i].disabled=v!==null||over;
    });
    if(st){
      if(wins(board,'X')){st.textContent='¡GANASTE! (¿Trampa?)';st.style.color='#00ff00';}
      else if(wins(board,'O')){st.textContent='GANA EL PATO. Inevitable.';st.style.color='#ff0000';}
      else if(!board.includes(null)){st.textContent='EMPATE. El pato bosteza.';st.style.color='#ffff00';}
      else st.textContent='TU TURNO ✕';
    }
  }

  function play(i){
    if(board[i]||over)return;
    beepClick();board[i]='X';
    if(wins(board,'X')){over=true;render();beepGood();setTimeout(()=>showGameOver(100,'"¿Trampa? El pato investiga."',true),700);return;}
    if(!board.includes(null)){over=true;render();setTimeout(()=>showGameOver(50,'"Empate. Lo mínimo aceptable."'),700);return;}
    setTimeout(()=>{
      aiMove();
      if(wins(board,'O')){over=true;render();beepBad();setTimeout(()=>showGameOver(0,'"El pato siempre gana. Es la ley."'),700);return;}
      if(!board.includes(null)){over=true;render();setTimeout(()=>showGameOver(50,'"Empate estratégico."'),700);return;}
      render();
    },320);
    render();
  }

  C.innerHTML=`
    <div class="game-title-bar" style="max-width:380px;">
      <span class="game-title">❌ 3 EN RAYA</span>
    </div>
    <p id="ttt-st" style="margin-bottom:12px;color:#fff;font-size:.88rem;">TU TURNO ✕</p>
    <div class="ttt-grid">${Array(9).fill(0).map((_,i)=>`<button class="ttt-cell" onclick="tttP(${i})"></button>`).join('')}</div>
    <div class="btn-row" style="margin-top:14px;"><button class="btn-terminal" onclick="tttNew()">[↺ NUEVA]</button></div>`;

  window.tttP=play;
  window.tttNew=()=>{board=Array(9).fill(null);over=false;render();};
  cleanupFn=()=>{};
  window.tttNew();
}

  window.memStart=(cols,rows)=>{
    beepClick();

    const emojis=MEM_E.slice(0,pairs);
    let cards=[...emojis,...emojis].sort(()=>Math.random()-.5);

        <span class="game-title">🃏 MEMORY DUCK</span>

      grid.appendChild(card);
    });

    timer=setInterval(()=>{secs++;const el=document.getElementById('mt');if(el)el.textContent=secs+'s';},1000);

    window.memFlip=(i,card,emoji)=>{
      if(locked||flipped.some(f=>f.i===i)||card.classList.contains('matched'))return;
      card.classList.remove('face-down');card.classList.add('revealed');card.textContent=emoji;
      beepClick();flipped.push({i,card,emoji});
      if(flipped.length===2){
        locked=true;
        const [a,b]=flipped;
        if(a.emoji===b.emoji){
          a.card.classList.replace('revealed','matched');b.card.classList.replace('revealed','matched');
          matched++;beepGood();
          document.getElementById('mp').textContent=`${matched}/${pairs}`;
          flipped=[];locked=false;

            clearInterval(timer);
            const score=Math.max(0,1000-secs*10)+bonus;
            const m=cols===4&&rows===4?'"4×4 completado. Impresionante para humano."':cols===4?'"Memoria decente. Para variar."':'"6×6 completado. Casi me sorprendes."';

          }

            a.card.classList.remove('revealed');a.card.classList.add('face-down');a.card.textContent='?';
            b.card.classList.remove('revealed');b.card.classList.add('face-down');b.card.textContent='?';
            flipped=[];locked=false;
          },850);
          beepBad();
        }
      }
    };
    cleanupFn=()=>clearInterval(timer);
  };
}

function initBeat(C){
  const NOTES=[{k:'A',f:261,l:'DO'},{k:'S',f:329,l:'MI'},{k:'D',f:392,l:'SOL'},{k:'F',f:523,l:'DO+'}];
  let seq=[],playerSeq=[],round=0,accepting=false;

  C.innerHTML=`

      ${NOTES.map((n,i)=>`<button class="beat-btn" id="bb${i}" onclick="beatP(${i})" disabled>${n.l}<span class="bk">[${n.k}]</span></button>`).join('')}
    </div>
    <p style="font-size:.72rem;color:rgba(0,255,0,.4);text-align:center;margin-top:7px;">USA A S D F o CLICK</p>`;

  function playNote(i,dur=300){
    const btn=document.getElementById('bb'+i);
    if(btn){btn.classList.add('active');setTimeout(()=>btn.classList.remove('active'),dur-60);}
    beep(NOTES[i].f,dur,'square',.15);
  }

  async function showSeq(){
    accepting=false;
    C.querySelectorAll('.beat-btn').forEach(b=>b.disabled=true);
    document.getElementById('bs').textContent='▶ OBSERVA...';
    await new Promise(r=>setTimeout(r,600));
    for(const idx of seq){playNote(idx);await new Promise(r=>setTimeout(r,520));}
    await new Promise(r=>setTimeout(r,300));
    accepting=true;playerSeq=[];
    C.querySelectorAll('.beat-btn').forEach(b=>b.disabled=false);
    document.getElementById('bs').textContent='▶ TU TURNO — REPITE LA SECUENCIA';
  }

  function nextRound(){
    round++;
    document.getElementById('br').textContent=round;
    seq.push(Math.floor(Math.random()*4));
    showSeq();
  }

  window.beatP=(i)=>{
    if(!accepting)return;
    playNote(i,200);playerSeq.push(i);
    const pos=playerSeq.length-1;
    if(playerSeq[pos]!==seq[pos]){
      accepting=false;C.querySelectorAll('.beat-btn').forEach(b=>b.disabled=true);
      beepBad();
      const m=round<5?'"¿Seguro que tienes oídos?"':round<10?'"Ritmo básico. Suficiente."':'"Oído fino. No esperaba menos... bueno, sí."';
      setTimeout(()=>showGameOver(round*50,m),600);return;
    }
    if(playerSeq.length===seq.length){accepting=false;beep(880,100,'square',.1);setTimeout(nextRound,600);}
  };

  const onKey=e=>{const m={a:0,s:1,d:2,f:3};const i=m[e.key.toLowerCase()];if(i!==undefined)window.beatP(i);};
  window.addEventListener('keydown',onKey);
  cleanupFn=()=>window.removeEventListener('keydown',onKey);
  nextRound();
}

/* ============================================================
   GAME 9 — SUDOKU DUCK
   ============================================================ */
function initSudoku(C){
  C.innerHTML=`
    <div class="game-title-bar" style="max-width:380px;">
      <span class="game-title">🔲 SUDOKU DUCK</span>
    </div>
    <p style="font-size:.82rem;color:var(--gd);margin-bottom:14px;">ELIGE DIFICULTAD:</p>
    <div class="btn-row">
      <button class="btn-terminal" onclick="skStart(6)">[FÁCIL — 10 pistas]</button>
      <button class="btn-terminal danger" onclick="skStart(10)">[DIFÍCIL — 6 pistas]</button>
    </div>`;

  window.skStart=(remove)=>{
    beepClick();
    // Generate 4x4 solution
    function solve(g){
      for(let r=0;r<4;r++)for(let c=0;c<4;c++){
        if(!g[r][c]){
          const nums=[1,2,3,4].sort(()=>Math.random()-.5);
          for(const n of nums){
            g[r][c]=n;
            const ok=()=>{
              for(let i=0;i<4;i++){
                for(let j=0;j<4;j++){
                  if(!g[i][j])continue;
                  for(let k=0;k<4;k++){
                    if(k!==j&&g[i][k]===g[i][j])return false;
                    if(k!==i&&g[k][j]===g[i][j])return false;
                  }
                  const br=Math.floor(i/2)*2,bc=Math.floor(j/2)*2;
                  for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++){
                    if((br+dr!==i||bc+dc!==j)&&g[br+dr][bc+dc]===g[i][j])return false;
                  }
                }
              }return true;
            };
            if(ok()&&solve(g))return true;
            g[r][c]=0;
          }
          return false;
        }
      }return true;
    }
    const sol=Array.from({length:4},()=>Array(4).fill(0));
    solve(sol);
    const puzzle=sol.map(r=>[...r]);
    const idxs=Array.from({length:16},(_,i)=>i).sort(()=>Math.random()-.5);
    for(let k=0;k<remove;k++){const idx=idxs[k];puzzle[Math.floor(idx/4)][idx%4]=0;}

    let selected=null,errors=0,secs=0,timer,revealed=false;

    C.innerHTML=`
      <div class="game-title-bar" style="max-width:380px;">
        <span class="game-title">🔲 SUDOKU DUCK</span>
        <div class="game-meta">TIEMPO:<span id="sk-t">0s</span>&nbsp;ERRORES:<span id="sk-e">0</span></div>
      </div>
      <div class="sudoku-grid" id="sk-g"></div>
      <div class="numpad">
        ${[1,2,3,4].map(n=>`<button class="numpad-btn" onclick="skNum(${n})">[${n}]</button>`).join('')}
        <button class="numpad-btn" onclick="skNum(0)">[✕]</button>
      </div>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn-terminal" onclick="skVerify()">[✓ VERIFICAR]</button>
        <button class="btn-terminal danger" onclick="skReveal()">[RESOLVER]</button>
      </div>
      <p id="sk-m" style="margin-top:8px;min-height:18px;font-size:.8rem;text-align:center;"></p>`;

    const grid=document.getElementById('sk-g');
    for(let r=0;r<4;r++)for(let c=0;c<4;c++){
      const cell=document.createElement('div');
      cell.className='sudoku-cell'+(puzzle[r][c]?' prefilled':'');
      cell.dataset.r=r;cell.dataset.c=c;
      cell.textContent=puzzle[r][c]||'';
      // thick borders for 2x2 quadrants
      if(c===2)cell.style.borderLeft='2px solid #00ff00';
      if(r===2)cell.style.borderTop='2px solid #00ff00';
      if(!puzzle[r][c])cell.addEventListener('click',()=>skSelect(r,c));
      grid.appendChild(cell);
    }

    timer=setInterval(()=>{secs++;const el=document.getElementById('sk-t');if(el)el.textContent=secs+'s';},1000);

    window.skSelect=(r,c)=>{
      selected={r,c};
      C.querySelectorAll('.sudoku-cell').forEach(el=>el.classList.remove('selected'));
      const el=C.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      if(el&&!el.classList.contains('prefilled'))el.classList.add('selected');
    };

    window.skNum=(n)=>{
      if(!selected||revealed)return;
      const{r,c}=selected;
      if(sol[r][c]&&puzzle[r][c]===sol[r][c])return;
      puzzle[r][c]=n;
      const el=C.querySelector(`[data-r="${r}"][data-c="${c}"]`);
      if(el){el.textContent=n||'';el.classList.remove('wrong','solved');}
      beepClick();
    };

    window.skVerify=()=>{
      let hasWrong=false,complete=true;
      for(let r=0;r<4;r++)for(let c=0;c<4;c++){
        const el=C.querySelector(`[data-r="${r}"][data-c="${c}"]`);
        if(!el||el.classList.contains('prefilled'))continue;
        el.classList.remove('wrong','solved');
        if(!puzzle[r][c]){complete=false;continue;}
        if(puzzle[r][c]!==sol[r][c]){el.classList.add('wrong');hasWrong=true;errors++;document.getElementById('sk-e').textContent=errors;}
      }
      if(!hasWrong&&complete){
        clearInterval(timer);
        const score=Math.max(0,1000-errors*100-secs*2);
        const m=errors===0?'"Lógica pura. Respetable."':`"${errors} errores. La lógica no es lo tuyo."`;
        setTimeout(()=>showGameOver(score,m,true),400);beepGood();
      }else if(!hasWrong){
        const mel=document.getElementById('sk-m');if(mel){mel.textContent='Sin errores visibles — faltan celdas.';mel.style.color='#ffff00';}
      }else beepBad();
    };

    window.skReveal=()=>{
      revealed=true;clearInterval(timer);
      for(let r=0;r<4;r++)for(let c=0;c<4;c++){
        puzzle[r][c]=sol[r][c];
        const el=C.querySelector(`[data-r="${r}"][data-c="${c}"]`);
        if(el&&!el.classList.contains('prefilled')){el.textContent=sol[r][c];el.classList.add('solved');}
      }
      setTimeout(()=>showGameOver(0,'"Trampa detectada. El pato lo sabe."'),800);
    };

    cleanupFn=()=>clearInterval(timer);
  };
}

/* ============================================================
   GAME 10 — BUG HUNT
   ============================================================ */
const BUGS=[
  {lines:['function suma(a, b) {','  return a - b;','}'],bug:1,ex:'return a - b → debería ser a + b'},
  {lines:['for (let i = 0; i <= arr.length; i++) {','  console.log(arr[i]);','}'],bug:0,ex:'<= arr.length causa índice fuera de rango'},
  {lines:['if (x = 5) {','  doSomething();','}'],bug:0,ex:'x = 5 es asignación, no comparación (use ===)'},
  {lines:['async function load() {','  const data = fetch(url);','  return data.json();','}'],bug:1,ex:'Falta await antes de fetch(url)'},
  {lines:['arr.push[item];'],bug:0,ex:'push[] usa corchetes — debe ser push(item)'},
  {lines:['setTimeout(callback(), 1000);'],bug:0,ex:'callback() se ejecuta inmediatamente — quitar ()'},
  {lines:['const obj = { a: 1 };','Object.freeze(obj);','obj.a = 2; // cree que funciona'],bug:2,ex:'freeze congela propiedades — obj.a no cambia'},
  {lines:['if (x == null) {','  return;','}'],bug:0,ex:'== null también captura undefined — usar === si es estricto'},
  {lines:['list = [1, 2, 3]','print(list.length)'],bug:0,ex:'"list" sobreescribe el builtin en Python'},
  {lines:['for i in range(1, 10):','  print(i)  # llega a 9'],bug:0,ex:'range(1,10) no incluye el 10 — usar range(1,11)'},
  {lines:['function divide(a, b) {','  return a / b;','}'],bug:1,ex:'No hay comprobación de división por cero'},
  {lines:['const arr = [1, 2, 3];','arr = arr.reverse();','console.log(arr);'],bug:1,ex:'reverse() muta el original — la reasignación es redundante'},
  {lines:['let result = "5" + 3;','if (result === 8) {','  console.log("OK"); }'],bug:0,ex:'"5" + 3 = "53" por coerción — no es 8'},
  {lines:['const user = null;','console.log(user.name);'],bug:1,ex:'Null reference — user es null, no tiene .name'},
  {lines:['MIENTRAS i < 10 HACER','  i = i - 1','FIN'],bug:1,ex:'i = i - 1 nunca llega a 10 — bucle infinito'},
  {lines:['dict["missing_key"]'],bug:0,ex:'KeyError si no existe — usar dict.get("key") en Python'},
  {lines:['if (0.1 + 0.2 == 0.3) {','  console.log("igual");','}'],bug:0,ex:'0.1+0.2 = 0.30000000000000004 — precisión flotante'},
  {lines:['function greet(name) {','  return','  { message: "Hola " + name };','}'],bug:1,ex:'return sin valor por salto de línea (ASI)'},
  {lines:['const arr = [1,2,3];','console.log(arr[arr.length]);'],bug:1,ex:'arr[arr.length] es undefined — el último es arr[length-1]'},
  {lines:['def suma(a, b):','  return a + b','resultado = suma(1, 2, 3)'],bug:2,ex:'suma() acepta 2 args, se pasan 3'},
];

function initBugHunt(C){
  const rounds=[...BUGS].sort(()=>Math.random()-.5).slice(0,10);
  let ri=0,score=0,correct=0,timer,tl;

  function renderRound(){
    if(ri>=rounds.length){
      const m=correct===10?'"Ojo clínico. Casi tan bueno como el pato."':correct>=7?'"Decente. Para ser humano."':'"¿Llevas los bugs a producción también?"';
      showGameOver(score,m);return;
    }
    const bug=rounds[ri];tl=20;
    C.innerHTML=`
      <div class="game-title-bar" style="max-width:700px;">
        <span class="game-title">🐛 BUG HUNT</span>
        <div class="game-meta">RONDA:<span>${ri+1}/10</span>&nbsp;SCORE:<span>${score}</span></div>
      </div>
      <div class="terminal-box wide">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-size:.75rem;color:var(--gd);">CLICK EN LA LÍNEA CON EL BUG</span>
          <span id="bh-t" style="color:#ffff00;font-size:.85rem;">${tl}s</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="bh-p" style="width:100%;"></div></div>
        <div class="code-block">
          ${bug.lines.map((line,i)=>`
            <div class="code-line" id="bl-${i}" onclick="bhClick(${i})">
              <span class="line-num">${i+1}</span>
              <span class="line-sep">│</span>
              <span class="line-code">${line.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
            </div>`).join('')}
        </div>
        <p id="bh-m" style="min-height:22px;font-size:.8rem;margin-top:7px;"></p>
      </div>`;

    clearInterval(timer);
    timer=setInterval(()=>{
      tl--;
      const te=document.getElementById('bh-t'),pe=document.getElementById('bh-p');
      if(te)te.textContent=tl+'s';
      if(pe){pe.style.width=(tl/20*100)+'%';pe.style.background=tl<6?'#ff0000':'#00ff00';}
      if(tl<=0){
        clearInterval(timer);
        const bl=document.getElementById('bl-'+bug.bug);if(bl)bl.classList.add('correct-line');
        const me=document.getElementById('bh-m');if(me){me.textContent='⏱ TIEMPO — '+bug.ex;me.style.color='#ff0000';}
        beepBad();ri++;setTimeout(renderRound,1400);
      }
    },1000);
  }

  window.bhClick=(li)=>{
    clearInterval(timer);
    const bug=rounds[ri];
    C.querySelectorAll('.code-line').forEach(l=>l.style.pointerEvents='none');
    const me=document.getElementById('bh-m');
    if(li===bug.bug){
      score+=100+tl*5;correct++;
      document.getElementById('bl-'+li).classList.add('correct-line');
      if(me){me.textContent='✓ BUG ENCONTRADO: '+bug.ex;me.style.color='#00ff00';}
      beepGood();
    }else{
      document.getElementById('bl-'+li).classList.add('wrong-line');
      document.getElementById('bl-'+bug.bug).classList.add('correct-line');
      if(me){me.textContent=`✗ ERA LÍNEA ${bug.bug+1}: ${bug.ex}`;me.style.color='#ff0000';}
      beepBad();
    }
    ri++;setTimeout(renderRound,1400);
  };
  cleanupFn=()=>clearInterval(timer);
  renderRound();
}

/* ============================================================
   GAME 11 — DUCK WORDLE
   ============================================================ */
const WORDS=['REACT','REDUX','PROXY','FETCH','ASYNC','AWAIT','ARRAY','CLASS','CONST',
  'DEBUG','ERROR','EVENT','FIBER','HOOKS','INDEX','INPUT','MERGE','MODAL',
  'MUTEX','PARSE','PATCH','QUEUE','QUERY','ROUTE','SCOPE','STACK','STATE',
  'STORE','STYLE','TABLE','TOKEN','TUPLE','TYPED','UNION','UNDEF','VALUE',
  'WHILE','YIELD','CACHE','CHUNK','CLONE','CODEC','DEFER','DRAFT','FLASH',
  'FORCE','FRAME','GRANT','SPAWN','BLOBS'];

const KB=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['↵','Z','X','C','V','B','N','M','⌫']];

function initWordle(C){
  const target=WORDS[Math.floor(Math.random()*WORDS.length)];
  let current='',row=0,done=false;
  const kbState={};

  C.innerHTML=`
    <div class="game-title-bar" style="max-width:360px;">
      <span class="game-title">💬 DUCK WORDLE</span>
      <div class="game-meta">INTENTOS:<span id="wd-a">0</span>/6</div>
    </div>
    <p id="wd-m" style="min-height:18px;font-size:.78rem;color:#ffff00;margin-bottom:6px;text-align:center;"></p>
    <div class="wordle-grid">
      ${Array.from({length:6},(_,r)=>`<div class="wordle-row">
        ${Array.from({length:5},(_,c)=>`<div class="wordle-cell" id="wd-${r}-${c}"></div>`).join('')}
      </div>`).join('')}
    </div>
    <div class="wordle-keyboard">
      ${KB.map(krow=>`<div class="wordle-kb-row">
        ${krow.map(k=>`<button class="kb-key${k.length>1?' wide':''}" data-key="${k}" onclick="wKey('${k}')">${k}</button>`).join('')}
      </div>`).join('')}
    </div>`;

  function updateRow(){
    for(let c=0;c<5;c++){
      const cell=document.getElementById(`wd-${row}-${c}`);
      if(!cell)continue;
      cell.textContent=current[c]||'';
      cell.className='wordle-cell'+(current[c]?' filled':'');
    }
  }

  function submitGuess(){
    const guess=current;
    const result=Array(5).fill('absent');
    const tArr=target.split(''),gArr=guess.split('');
    gArr.forEach((l,i)=>{if(l===tArr[i]){result[i]='correct';tArr[i]=null;gArr[i]=null;}});
    gArr.forEach((l,i)=>{if(l&&tArr.includes(l)){result[i]='present';tArr[tArr.indexOf(l)]=null;}});

    for(let c=0;c<5;c++){
      const cell=document.getElementById(`wd-${row}-${c}`);
      if(cell){cell.textContent=guess[c];cell.className='wordle-cell '+result[c];}
    }
    // Update keyboard
    for(let c=0;c<5;c++){
      const key=document.querySelector(`[data-key="${guess[c]}"]`);
      if(!key)continue;
      const prev=kbState[guess[c]]||'';
      const priority={correct:3,present:2,absent:1};
      if((priority[result[c]]||0)>(priority[prev]||0)){kbState[guess[c]]=result[c];key.className='kb-key '+result[c];}
    }
    row++;document.getElementById('wd-a').textContent=row;

    if(guess===target){
      done=true;beepGood();
      const m=row===1?'"¿Trampa? No hay otra explicación."':row<=3?'"Rápido. Casi como el pato."':row<=5?'"Lo conseguiste. Por los pelos."':'"Último intento. El pato sudó frío."';
      setTimeout(()=>showGameOver((7-row)*100,m,true),600);
    }else if(row>=6){
      done=true;beepBad();
      setTimeout(()=>showGameOver(0,`"La palabra era: ${target}. Vergonzoso."`),600);
    }else{current='';updateRow();}
  }

  window.wKey=(k)=>{
    if(done)return;
    const me=document.getElementById('wd-m');
    if(k==='⌫'){current=current.slice(0,-1);updateRow();}
    else if(k==='↵'){
      if(current.length<5){if(me)me.textContent='PALABRA INCOMPLETA';return;}
      if(!WORDS.includes(current)){if(me){me.textContent='PALABRA NO VÁLIDA';} beepBad();return;}
      if(me)me.textContent='';
      submitGuess();
    }else if(current.length<5){current+=k;updateRow();beep(880,35,'square',.05);}
  };

  const onKey=e=>{
    if(done)return;
    if(e.key==='Enter')window.wKey('↵');
    else if(e.key==='Backspace')window.wKey('⌫');
    else if(/^[a-zA-Z]$/.test(e.key))window.wKey(e.key.toUpperCase());
  };
  window.addEventListener('keydown',onKey);
  cleanupFn=()=>window.removeEventListener('keydown',onKey);
}
